<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cawnporiya | Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#fff;color:#111}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 6%;
background:#fff;
position:fixed;
width:100%;
top:0;
z-index:1000;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}
.logo{font-size:22px;font-weight:700;color:#7d4e2d}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:0 20px;
background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('https://lh3.googleusercontent.com/d/1nKgkVZBpx9kOgqfilBABOI77yjX6zh35');
background-size:cover;
background-position:center;
color:#fff;
}

.hero h1{
font-size:2.5rem;
margin-bottom:10px;
font-weight:700;
}

.hero p{
font-size:1.1rem;
opacity:.9;
margin-bottom:25px;
}

/* BUTTON */
.btn{
background:#fff;
color:#000;
padding:14px 30px;
border-radius:30px;
font-weight:600;
text-decoration:none;
transition:.3s;
}
.btn:hover{
background:#f3e5ab;
}

/* COUNTDOWN */
.timer{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
}
.box{
background:#fff;
color:#000;
padding:10px;
border-radius:10px;
min-width:70px;
font-weight:600;
}

/* SECTION */
.section{
padding:80px 6%;
text-align:center;
}

.section h2{
font-size:2rem;
margin-bottom:20px;
color:#7d4e2d;
}

/* PRODUCTS */
.grid{
display:grid;
grid-template-columns:1fr;
gap:25px;
margin-top:30px;
}

.card{
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.3s;
}
.card:hover{transform:translateY(-8px)}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{padding:15px}

/* FOOTER */
footer{
background:#2d1b10;
color:#fff;
text-align:center;
padding:40px 20px;
}

/* MOBILE CTA */
.sticky{
position:fixed;
bottom:0;
width:100%;
background:#fff;
padding:10px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}
.sticky a{
display:block;
background:#25d366;
color:#fff;
text-align:center;
padding:14px;
border-radius:30px;
text-decoration:none;
font-weight:600;
}

/* DESKTOP */
@media(min-width:768px){
.hero h1{font-size:3.5rem}
.grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

<header>
<div class="logo">CAWNPORIYA</div>
</header>

<section class="hero">
<div>
<h1>Coming Soon</h1>
<p>Shuddh Gur, Seedha Khet Se</p>

<div class="timer">
<div class="box" id="days">00</div>
<div class="box" id="hours">00</div>
<div class="box" id="minutes">00</div>
</div>

<br>
<a href="https://wa.me/917860398340" class="btn">Notify Me</a>
</div>
</section>

<section class="section">
<h2>Our Products</h2>

<div class="grid">

<div class="card">
<img src="https://lh3.googleusercontent.com/d/1wzyzYiovjIYAK1OaOuavkOtypG9FDGFY">
<div class="card-body">
<h3>Desi Gur</h3>
<p>100% Natural & Pure</p>
</div>
</div>

<div class="card">
<img src="https://lh3.googleusercontent.com/d/1fArWnMJsU8SSp9M2yaWd9fIJLVUBbsXj">
<div class="card-body">
<h3>Jaggery Powder</h3>
<p>Healthy & Chemical Free</p>
</div>
</div>

</div>
</section>

<footer>
<h3>CAWNPORIYA</h3>
<p>Kanpur Agro Farms LLP</p>
<p>शुद्ध • सही • स्वदेशी</p>
</footer>

<div class="sticky">
<a href="https://wa.me/917860398340">💬 Notify on WhatsApp</a>
</div>

<script>
// countdown
const target = new Date("April 1, 2026").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = target - now;

let d = Math.floor(diff/(1000*60*60*24));
let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let m = Math.floor((diff%(1000*60*60))/(1000*60));

document.getElementById("days").innerText=d;
document.getElementById("hours").innerText=h;
document.getElementById("minutes").innerText=m;
},1000);
</script>

</body>
</html>
